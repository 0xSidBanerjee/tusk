name: Feature Request
description: Suggest something new
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before requesting a feature, check the [roadmap](https://github.com/0xSidBanerjee/tusk#roadmap) and open issues to see if it's already planned or discussed.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case. What are you trying to do and what gets in the way?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Be as specific as you can.
    validations:
      required: true

  - type: dropdown
    id: interface
    attributes:
      label: Which interface does this affect?
      options:
        - Web UI
        - TUI
        - CLI
        - Backend / API
        - All
        - Not sure
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds or considered other approaches?

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I've checked that this isn't already requested or planned
          required: true
        - label: This feature fits Tusk's local-first, no-account philosophy
          required: true