name: "🐛 Bug Report"
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill this out as completely as you can.

  - type: input
    id: version
    attributes:
      label: Tusk version
      description: Run `./tusk --version` or check the release tag
      placeholder: v0.3.0
    validations:
      required: true

  - type: dropdown
    id: interface
    attributes:
      label: Which interface does this affect?
      options:
        - Web UI
        - TUI
        - CLI
        - All
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Docker
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `./tusk serve`
        2. Create a task with deadline set to today
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any relevant terminal output or error messages.
      render: shell
